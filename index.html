<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社会认知测试 — 你真的了解这个世界吗？</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card: #fff;
    --text: #2c2c2c;
    --muted: #8c8c82;
    --border: #e6e4dd;
    --accent: #3d3929;
    --gold: #b8954a;
    --red-soft: #f5e6e0;
    --red-text: #a04030;
    --green-soft: #e0ece3;
    --green-text: #3a6040;
    --yellow-soft: #f4ecd8;
    --yellow-text: #8a7030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 760px; margin: 0 auto; padding: 48px 20px 100px; }

  /* ====== 封面 ====== */
  .cover { text-align: center; padding: 50px 0 30px; }
  .cover h1 { font-size: 2em; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; }
  .cover .subtitle { font-size: 1em; color: var(--muted); margin-bottom: 8px; }
  .cover .subtitle2 { font-size: 0.88em; color: #aaa; margin-bottom: 32px; }
  .cover .meta { display: flex; justify-content: center; gap: 36px; font-size: 0.85em; color: #999; margin-bottom: 40px; }
  .cover .meta span { display: flex; align-items: center; gap: 5px; }
  .start-btn {
    padding: 13px 52px; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; font-size: 1.05em; cursor: pointer; letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #555045; }

  /* ====== 进度 ====== */
  .progress-wrap { display: none; margin-bottom: 28px; }
  .progress-bar-bg { background: #e8e6df; border-radius: 5px; height: 5px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 5px; transition: width 0.35s; width: 0%; }
  .progress-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8em; color: #aaa; }

  /* ====== 题目卡片 ====== */
  .question-card {
    display: none; background: var(--card); border-radius: 14px; padding: 36px 30px;
    margin-bottom: 20px; border: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,0.03);
  }
  .question-card.active { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .q-index { font-size: 0.78em; color: #bbb; letter-spacing: 3px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; }
  .q-label { font-size: 0.82em; color: var(--muted); margin-bottom: 18px; font-style: italic; }

  /* 情景叙述 — 更长的故事 */
  .scenario {
    font-size: 0.98em; line-height: 1.85; color: #3a3a3a; margin-bottom: 28px;
    padding: 20px 22px; background: #fafaf7; border-radius: 8px;
    border-left: 3px solid #d5d0c5;
  }
  .scenario p { margin-bottom: 10px; }
  .scenario p:last-child { margin-bottom: 0; }

  /* ====== 选项 ====== */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex; align-items: flex-start; gap: 13px;
    padding: 15px 18px; border: 1.5px solid var(--border); border-radius: 10px;
    cursor: pointer; transition: all 0.18s;
  }
  .option:hover { border-color: #bab5a8; background: #fdfdfb; }
  .option.selected { border-color: var(--accent); background: #f8f7f2; }
  .option .radio {
    width: 19px; height: 19px; min-width: 19px;
    border: 2px solid #c8c4ba; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin-top: 3px;
    transition: all 0.18s;
  }
  .option.selected .radio { border-color: var(--accent); }
  .option.selected .radio::after {
    content: ""; width: 9px; height: 9px; background: var(--accent); border-radius: 50%;
  }
  .option .opt-label { font-weight: 600; font-size: 0.82em; color: #b0ab9e; min-width: 20px; margin-top: 2px; }
  .option.selected .opt-label { color: var(--accent); }
  .option .opt-text { flex: 1; font-size: 0.93em; }

  /* ====== 导航 ====== */
  .nav-btns { display: none; justify-content: space-between; margin-top: 28px; }
  .nav-btn {
    padding: 10px 32px; border-radius: 7px; font-size: 0.92em; cursor: pointer;
    border: 1.5px solid #ccc; background: #fff; transition: all 0.15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: #999; }
  .nav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-btn.primary:hover:not(:disabled) { background: #555045; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ====== 提交弹窗 ====== */
  .submit-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 100; align-items: center; justify-content: center;
  }
  .submit-modal.show { display: flex; }
  .submit-modal .modal-inner {
    background: #fff; border-radius: 14px; padding: 36px 32px; max-width: 420px;
    width: 90%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  .submit-modal .modal-inner h3 { font-size: 1.15em; margin-bottom: 10px; }
  .submit-modal .modal-inner p { font-size: 0.9em; color: #777; margin-bottom: 24px; line-height: 1.6; }
  .submit-modal .modal-btns { display: flex; gap: 12px; justify-content: center; }
  .submit-modal .modal-btns button {
    padding: 9px 30px; border-radius: 7px; font-size: 0.9em; cursor: pointer; border: 1.5px solid #ccc;
    background: #fff; transition: all 0.15s;
  }
  .submit-modal .modal-btns button.confirm { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ====== 结果页 ====== */
  .result-wrap { display: none; }
  .result-wrap.active { display: block; animation: fadeUp 0.5s ease; }

  .result-hero {
    text-align: center; padding: 36px 0 20px;
  }
  .result-hero .score-number {
    font-size: 5em; font-weight: 800; letter-spacing: -2px;
    color: var(--accent); line-height: 1;
  }
  .result-hero .score-label { font-size: 0.95em; color: var(--muted); margin-top: 4px; }
  .result-hero .profile-tag {
    display: inline-block; margin-top: 14px; padding: 6px 20px;
    border-radius: 20px; font-size: 0.92em; font-weight: 600; letter-spacing: 0.5px;
  }
  .profile-tag.level-a { background: var(--green-soft); color: var(--green-text); }
  .profile-tag.level-b { background: #e8ece6; color: #506040; }
  .profile-tag.level-c { background: var(--yellow-soft); color: var(--yellow-text); }
  .profile-tag.level-d { background: #f5ede4; color: #8a6040; }
  .profile-tag.level-e { background: var(--red-soft); color: var(--red-text); }

  /* 维度分析卡片 */
  .dimensions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 24px 0 30px;
  }
  @media (max-width: 500px) { .dimensions { grid-template-columns: 1fr; } }
  .dim-card {
    background: var(--card); border-radius: 10px; padding: 18px 18px; border: 1px solid var(--border);
  }
  .dim-card .dim-name { font-size: 0.85em; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
  .dim-card .dim-bar-bg { background: #eae7df; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 6px; }
  .dim-card .dim-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .dim-card .dim-score { font-size: 0.8em; color: var(--muted); }
  .fill-high { background: #7a9a70; }
  .fill-mid { background: #c4a35a; }
  .fill-low { background: #c47a5a; }

  .result-summary {
    background: var(--card); border-radius: 10px; padding: 24px 22px; margin-bottom: 28px;
    border: 1px solid var(--border); font-size: 0.93em; line-height: 1.8; color: #4a4a4a;
  }

  /* 逐题回顾 */
  .review-title {
    font-size: 1.05em; font-weight: 700; margin-bottom: 16px; color: var(--accent);
    letter-spacing: 0.5px;
  }
  .review-item {
    background: var(--card); border-radius: 10px; padding: 22px 20px; margin-bottom: 14px;
    border: 1px solid var(--border);
  }
  .review-item .ri-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .review-item .ri-num { font-weight: 700; font-size: 0.82em; color: #999; }
  .review-item .ri-tendency {
    font-size: 0.78em; padding: 3px 10px; border-radius: 10px; font-weight: 600;
  }
  .tendency-trust { background: #fde8e2; color: #a04838; }
  .tendency-avoid { background: #f4eee2; color: #8a6a38; }
  .tendency-confront { background: #f0e4e0; color: #7a4848; }
  .tendency-conform { background: #e8e4dc; color: #6a5a48; }
  .tendency-strategic { background: #dce8dc; color: #3a5a38; }
  .tendency-defensive { background: #e4dce4; color: #5a4a5a; }
  .review-item .ri-choice { font-size: 0.9em; color: #5a5a5a; margin-bottom: 8px; }
  .review-item .ri-read { font-size: 0.88em; color: #4a4a4a; line-height: 1.7; padding: 10px 14px; background: #fafaf6; border-radius: 6px; border-left: 2px solid #d5d0c0; }

  .restart-btn {
    display: block; margin: 36px auto 0; padding: 11px 40px;
    border: 1.5px solid #ccc; border-radius: 8px; background: #fff;
    font-size: 0.9em; cursor: pointer; transition: all 0.15s;
  }
  .restart-btn:hover { border-color: #999; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container" id="app">

  <!-- ========== 封面 ========== -->
  <div class="cover" id="cover">
    <h1>走出校园的第一课</h1>
    <p class="subtitle">一份没有标准答案的行为评估</p>
    <p class="subtitle2">15 个真实情境 &middot; 每种选择都代表一种生存策略</p>
    <div class="meta">
      <span>15 道情景题</span><span>约 15 分钟</span><span>行为画像分析</span>
    </div>
    <button class="start-btn" onclick="startTest()">开始</button>
  </div>

  <!-- ========== 进度条 ========== -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="progress-info">
      <span id="progressLabel">第 1 / 15 题</span>
      <span id="progressAnswered">已答 0 题</span>
    </div>
  </div>

  <!-- ========== 题目区 ========== -->
  <div id="questions"></div>

  <!-- ========== 导航 ========== -->
  <div class="nav-btns" id="navBtns">
    <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">上一题</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
  </div>

  <!-- ========== 提交确认弹窗 ========== -->
  <div class="submit-modal" id="submitModal">
    <div class="modal-inner">
      <h3>确认提交</h3>
      <p>所有题目均已作答。提交后将基于你的全部选择生成一份行为画像分析。这份分析不评判对错，而是帮助你了解自己在面对社会情境时的决策倾向。</p>
      <div class="modal-btns">
        <button onclick="closeSubmitModal()">返回检查</button>
        <button class="confirm" onclick="confirmSubmit()">提交查看</button>
      </div>
    </div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-hero">
      <div class="score-number" id="scoreNumber">0</div>
      <div class="score-label">社会成熟度指数（满分 100）</div>
      <div class="profile-tag" id="profileTag"></div>
    </div>
    <div class="dimensions" id="dimensionsGrid"></div>
    <div class="result-summary" id="resultSummary"></div>
    <div class="review-title">逐题行为回顾</div>
    <div class="result-detail" id="resultDetail"></div>
    <button class="restart-btn" onclick="restartTest()">重新测试</button>
  </div>

</div>

<script>
// ============================================================
// 题库：15 道情景题（每题 4 个选项）
// 每个选项有：
//   - text: 选项文本
//   - score: 0-100 综合社会成熟度得分
//   - dims: [风险评估, 边界意识, 信息验证, 利益洞察] 每维 0-25
//   - tendency: 行为倾向标签
//   - read: 结果页展示的解读
// ============================================================

const TENDENCY = {
  trust:    { label: '信任驱动', cls: 'tendency-trust',    desc: '倾向于基于情感和熟悉度做出决定，对他人的善意有较高预设' },
  avoid:    { label: '回避倾向', cls: 'tendency-avoid',    desc: '倾向于回避冲突和正面交涉，可能将问题延后或交给时间解决' },
  confront: { label: '直接对抗', cls: 'tendency-confront', desc: '倾向于立即正面回应，行动力强但可能缺乏策略缓冲' },
  conform:  { label: '从众参照', cls: 'tendency-conform',  desc: '倾向于以周围人的行为作为判断依据，相信"多数人的选择"' },
  strategic:{ label: '策略型',   cls: 'tendency-strategic',desc: '倾向于收集信息、评估多方利益后再行动，注重留痕和自我保护' },
  defensive:{ label: '过度防御', cls: 'tendency-defensive',desc: '倾向于假设最坏情况，可能因过度防范而错失合理机会或损害关系' }
};

const questions = [
  // ====== 第 1 题：大学室友的创业邀请 ======
  {
    id: 1,
    scenario: [
      "大四下铺的兄弟阿杰，跟你同住了四年，人品没得说——借的钱每次都还，考试帮你占座，你失恋他陪你喝到凌晨。毕业一年后他突然打来电话，声音很兴奋：他辞了工作，自己掏了五万块搭建了一个本地生活服务平台，跑通了前三个月的运营数据。",
      "他说得条理清晰：市场定位、竞品分析、初期获客策略，一听就是做了功课。他想拉你做联合创始人，全职加入，前六个月不发工资，纯股权。你要是加入就是 30% 的股份。他说已经有两个小商户签了意向书，下个月就能产生第一笔营收。",
      "你现在在一家稳定的公司拿着月薪八千，工作不讨厌但也没什么激情。"
    ],
    options: [
      {
        text: "他是信得过的兄弟，趁年轻赌一把。提离职，把所有积蓄预留六个月生活费，剩下的全情投入。",
        score: 35,
        dims: [8, 12, 5, 10],
        tendency: 'trust',
        read: "这个选择体现了高度的信任和行动力，但风险评估维度偏弱。信任一个人的人品和信任一个商业项目是两回事，前者不能替代后者。没有独立的尽调、没有法律协议框架就全身投入，是很多年轻人第一次创业吃亏的经典路径。"
      },
      {
        text: "认可项目，但提出先利用晚上和周末参与三个月，验证数据真实性和团队配合后再决定是否全职加入。",
        score: 78,
        dims: [20, 18, 23, 17],
        tendency: 'strategic',
        read: "这是有梯度的参与策略。既保留了信任和机会，又给自己设置了验证周期——三个月足够看清数据真假、判断团队能力和评估市场真实反馈。用可控的时间成本换取信息，是成熟的决策框架。"
      },
      {
        text: "跟他说自己不太适合创业，建议他找有行业经验的人合作。作为朋友可以帮忙转发推广，但不参与经营。",
        score: 55,
        dims: [16, 14, 10, 15],
        tendency: 'avoid',
        read: "清醒但偏保守。你识别了自己在大事上的犹豫，选择了退一步。这避免了最坏的情况，但也关上了一扇可能的门。关键在于：如果拒绝是基于风险评估而非单纯恐惧，这个选择是理性的。"
      },
      {
        text: "提出自己不出力但可以投两万块钱作为天使支持，签一份简单的借款或投资协议。",
        score: 48,
        dims: [10, 12, 16, 10],
        tendency: 'trust',
        read: "看似折中，实则模糊。小额度投资如果没有正规的股权协议和退出机制，钱投进去大概率既不是借款也不是投资，而是「人情债」——收不回来碍于情面不好追，朋友关系也可能因此受损。"
      }
    ]
  },

  // ====== 第 2 题：部门的人事暗流 ======
  {
    id: 2,
    scenario: [
      "你入职某中型公司快四个月了，一直跟着主管张姐做事。张姐业务能力强，但对人比较冷淡，你们之间主要是工作关系。部门里还有一位主管李哥，跟张姐平级，两人都在竞争即将空缺的副总监位置。",
      "李哥最近对你特别热情——请你吃了三次午饭，在会上两次公开表扬你的方案，还私下跟你说「张姐那套方法太老了，公司领导层其实更看好年轻化的团队，你在她手下发挥不出来」。",
      "上周五，李哥在茶水间单独跟你说：「我马上要组建新的项目组了，你要是过来，我可以直接给你带项目的权限，比你现在成长快得多。你考虑一下，不过暂时不用跟张姐说。」"
    ],
    options: [
      {
        text: "李哥这么看重我，而且确实给了我张姐没给的机会。私下答应，等李哥那边确定好了就转过去。",
        score: 22,
        dims: [5, 5, 3, 9],
        tendency: 'trust',
        read: "你看到的是「机会」，但没看到自己正在成为权力博弈中的棋子。李哥对你的热情恰好发生在竞争副总监的时间窗口，这大概率不是单纯的赏识。一旦站队失败，你在公司可能两面都不讨好。"
      },
      {
        text: "对李哥的赏识表示感谢，但表示目前手上项目还没做完，短期内不考虑变动。同时不主动跟张姐提起这件事。",
        score: 68,
        dims: [20, 15, 15, 18],
        tendency: 'strategic',
        read: "既不拒绝也不接受，用「手头工作」作为防火墙，给自己留出了观察时间。不主动告知张姐避免了激化矛盾，但如果张姐从别处知道了这件事而你没说，可能反而显得你有二心——后续需要找合适时机适度透露。"
      },
      {
        text: "把李哥的话原原本本告诉张姐，表示坚决站在她这边，让她知道自己忠心。",
        score: 38,
        dims: [8, 10, 8, 12],
        tendency: 'confront',
        read: "看似忠诚，实则把部门的隐性矛盾引爆了。张姐可能感激你的信息，但也会从此对你多一层防备——你今天能把李哥的话传给我，明天会不会把我的话传给李哥？职场中信息就是权力，随意交出信息源的人难以被信任。"
      },
      {
        text: "找其他老同事侧面了解张姐和李哥的为人、业绩和公司口碑，也观察一下谁是真心做事谁是只会搞关系，再做判断。",
        score: 82,
        dims: [21, 20, 24, 17],
        tendency: 'strategic',
        read: "在做出任何承诺之前先建立信息优势。了解两人的真实业绩、领导层对他们的态度、以及部门内的口碑分布，这些信息远比李哥的口头赏识更能帮你做出准确判断。四个月的时间还太短，多听多看才是最安全的策略。"
      }
    ]
  },

  // ====== 第 3 题：女友的咖啡店 ======
  {
    id: 3,
    scenario: [

// ============================================================
// 全局状态
// ============================================================
let currentQ = 0;
let choices = {}; // { questionId: optionIndex }
let finished = false;

// ============================================================
// UI
// ============================================================
function startTest() {
  currentQ = 0;
  choices = {};
  finished = false;
  hide('cover');
  showBlock('progressWrap');
  showBlock('navBtns');
  hide('resultWrap');
  renderQuestions();
  showQ(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestions() {
  const container = document.getElementById('questions');
  container.innerHTML = questions.map((q, qi) => {
    const paras = q.scenario.map(p => `<p>${p}</p>`).join('\n');
    const opts = q.options.map((o, oi) => `
      <div class="option" data-q="${qi}" data-o="${oi}" onclick="pick(${qi},${oi})">
        <div class="radio"></div>
        <div class="opt-label">${'ABCD'[oi]}</div>
        <div class="opt-text">${o.text}</div>
      </div>
    `).join('');
    return `
      <div class="question-card" id="qcard-${qi}">
        <div class="q-index">第 ${qi+1} 题</div>
        <div class="q-label">请选择最接近你真实反应的一项</div>
        <div class="scenario">${paras}</div>
        <div class="options">${opts}</div>
      </div>
    `;
  }).join('');
}

function showQ(idx) {
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('qcard-' + idx);
  if (card) card.classList.add('active');

  const qid = questions[idx].id;
  if (choices[qid] !== undefined) {
    const opts = document.querySelectorAll('#qcard-' + idx + ' .option');
    opts.forEach(o => o.classList.remove('selected'));
    opts[choices[qid]].classList.add('selected');
  }

  currentQ = idx;
  updateProgressUI();
  updateNavUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pick(qi, oi) {
  if (finished) return;
  choices[questions[qi].id] = oi;
  const opts = document.querySelectorAll('#qcard-' + qi + ' .option');
  opts.forEach(o => o.classList.remove('selected'));
  opts[oi].classList.add('selected');
  updateNavUI();
}

function updateProgressUI() {
  const answered = Object.keys(choices).length;
  const total = questions.length;
  const pct = Math.round((answered / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `第 ${currentQ + 1} / ${total} 题`;
  document.getElementById('progressAnswered').textContent = `已答 ${answered} 题`;
}

function updateNavUI() {
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentQ === 0;
  const answered = Object.keys(choices).length;
  if (currentQ === questions.length - 1 && answered === questions.length) {
    nextBtn.textContent = '查看行为画像';
    nextBtn.onclick = openSubmitModal;
    nextBtn.disabled = false;
  } else if (currentQ === questions.length - 1) {
    nextBtn.textContent = '下一题 →';
    nextBtn.onclick = nextQuestion;
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = '下一题 →';
    nextBtn.onclick = nextQuestion;
    nextBtn.disabled = false;
  }
}

function prevQuestion() { if (currentQ > 0) showQ(currentQ - 1); }
function nextQuestion() { if (currentQ < questions.length - 1) showQ(currentQ + 1); }

function openSubmitModal() {
  if (Object.keys(choices).length < questions.length) {
    const missed = questions.filter(q => choices[q.id] === undefined);
    alert('还有 ' + missed.length + ' 题未作答，请完成后提交。');
    showQ(questions.findIndex(q => choices[q.id] === undefined));
    return;
  }
  document.getElementById('submitModal').classList.add('show');
}

function closeSubmitModal() {
  document.getElementById('submitModal').classList.remove('show');
}

function confirmSubmit() {
  document.getElementById('submitModal').classList.remove('show');
  finished = true;
  hide('questions');
  hide('navBtns');
  hide('progressWrap');
  showResult();
}

// ============================================================
// 结果计算
// ============================================================
function showResult() {
  // 每人每题最高得分 100，加权平均
  let totalScore = 0;
  let dimTotals = [0, 0, 0, 0]; // 风险评估, 边界意识, 信息验证, 利益洞察
  const maxSingleScore = 100;

  questions.forEach(q => {
    const oi = choices[q.id];
    const opt = q.options[oi];
    totalScore += opt.score;
    for (let d = 0; d < 4; d++) dimTotals[d] += opt.dims[d];
  });

  const avgScore = Math.round(totalScore / questions.length);
  const dimAvgs = dimTotals.map(v => Math.round(v / questions.length));
  const dimNames = ['风险评估', '边界意识', '信息验证', '利益洞察'];
  const dimMax = 25;

  // 等级
  let levelClass, profileName, profileDesc;
  if (avgScore >= 80) {
    levelClass = 'level-a'; profileName = '社会洞察者'; profileDesc = '你对社会情境中的利益关系、风险边界和信息不对称有敏锐的感知。你的决策模式倾向于先验证再行动，在保护自己和维护关系之间取得了平衡。大多数的情景中你展现出了远超同龄人的成熟度。';
  } else if (avgScore >= 65) {
    levelClass = 'level-b'; profileName = '有经验的观察者'; profileDesc = '你在大部分情境中能够做出合理的判断，但某些特定场景下仍有盲区。你的直觉通常是好的，但直觉有时也需要独立信息的支撑。你已经走在逐步建立成熟社会认知的路上。';
  } else if (avgScore >= 50) {
    levelClass = 'level-c'; profileName = '过渡中的学习者'; profileDesc = '你的社会认知正处于校园思维向现实思维过渡的阶段。在一些场景中你能看到风险，但在另一些场景中情感因素或从众心理仍然主导着你的选择。这份测试中你所暴露的盲区，正是你可以优先关注的成长方向。';
  } else if (avgScore >= 35) {
    levelClass = 'level-d'; profileName = '信任优先者'; profileDesc = '你倾向于以善意解读他人的行为，这是珍贵的品质，但在复杂的社会环境中，纯粹的信任可能让你成为他人利益计算中的变量。不是说世界充满恶意，而是善意需要信息和边界的保护。';
  } else {
    levelClass = 'level-e'; profileName = '校园模式思考者'; profileDesc = '你的决策模式仍然延续着校园时期的框架——相信权威、相信熟人、相信书面承诺、相信多数人的选择。这些在校园里是合理策略，但在真实社会中，每一份善意背后都需要验证，每一个承诺背后都需要制度保障。这份测试是你了解这种差异的第一步。';
  }

  document.getElementById('scoreNumber').textContent = avgScore;
  const tag = document.getElementById('profileTag');
  tag.className = 'profile-tag ' + levelClass;
  tag.textContent = profileName;
  document.getElementById('resultSummary').innerHTML = `<p>${profileDesc}</p>`;

  // 维度卡片
  const dimsHtml = dimNames.map((name, i) => {
    const val = dimAvgs[i];
    const pct = Math.round((val / dimMax) * 100);
    let fillClass = 'fill-high';
    if (pct < 50) fillClass = 'fill-low';
    else if (pct < 70) fillClass = 'fill-mid';
    return `
      <div class="dim-card">
        <div class="dim-name">${name}</div>
        <div class="dim-bar-bg"><div class="dim-bar-fill ${fillClass}" style="width:${pct}%"></div></div>
        <div class="dim-score">${val} / ${dimMax} 分</div>
      </div>
    `;
  }).join('');
  document.getElementById('dimensionsGrid').innerHTML = dimsHtml;

  // 逐题回顾
  const reviewHtml = questions.map((q, idx) => {
    const oi = choices[q.id];
    const opt = q.options[oi];
    const tend = TENDENCY[opt.tendency];
    return `
      <div class="review-item">
        <div class="ri-header">
          <span class="ri-num">第 ${idx + 1} 题</span>
          <span class="ri-tendency ${tend.cls}">${tend.label}</span>
        </div>
        <div class="ri-choice">你的选择：${'ABCD'[oi]}. ${opt.text}</div>
        <div class="ri-read">${opt.read}</div>
      </div>
    `;
  }).join('');
  document.getElementById('resultDetail').innerHTML = reviewHtml;
  document.getElementById('resultWrap').classList.remove('hidden');
  document.getElementById('resultWrap').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartTest() {
  hide('resultWrap');
  document.getElementById('resultDetail').innerHTML = '';
  document.getElementById('dimensionsGrid').innerHTML = '';
  document.getElementById('questions').innerHTML = '';
  showBlock('cover');
  currentQ = 0;
  choices = {};
  finished = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// helpers
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showBlock(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).style.display = 'block'; }
</script>
